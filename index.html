<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad Assurance - Sidi Kacem</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("vk3TsCj2TbhWy2OOB"); })();</script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #006EB7;
            --secondary-blue: #004a7c;
            --light-bg: #f4f7f9;
            --white: #ffffff;
            --text-main: #333333;
            --border-color: #e1e8ed;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--light-bg);
            font-family: 'Cairo', sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main);
        }

        /* حاوية الشات كأنها نافذة موقع */
        .web-container {
            width: 100%; max-width: 600px; height: 90vh;
            background: var(--white);
            border-radius: 12px;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* الهيدر الاحترافي */
        .web-header {
            background: var(--primary-blue);
            color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .web-header img { height: 45px; background: white; padding: 5px; border-radius: 5px; }
        .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-left: 5px; }

        .chat-area { flex: 1; overflow-y: auto; padding: 25px; background: #fdfdfd; display: flex; flex-direction: column; gap: 15px; }

        /* جدول إدخال المعلومات */
        .info-table {
            background: #fff; border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden; margin-bottom: 10px;
            width: 100%; border-collapse: collapse;
        }
        .info-table td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .info-table tr:last-child td { border-bottom: none; }
        .info-table label { font-weight: 600; font-size: 0.9rem; color: var(--secondary-blue); }
        
        input, select {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 5px; font-family: 'Cairo'; outline: none;
        }

        .btn-submit {
            background: var(--primary-blue); color: white;
            border: none; padding: 12px 25px; border-radius: 6px;
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: var(--secondary-blue); }

        /* فقاعات الرسائل */
        .bubble { padding: 12px 16px; border-radius: 10px; max-width: 85%; font-size: 0.95rem; line-height: 1.6; }
        .bot { background: #eef2f6; color: #2c3e50; align-self: flex-start; border-bottom-right-radius: 20px; border: 1px solid #d6e0ea; }
        .user { background: var(--primary-blue); color: white; align-self: flex-end; border-bottom-left-radius: 20px; }

        .footer-input {
            padding: 15px 20px; border-top: 1px solid var(--border-color);
            display: none; gap: 10px; background: white;
        }
        #user-msg { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }

        /* القائمة المختصرة */
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { background: #fff; border: 1px solid var(--primary-blue); color: var(--primary-blue); 
                padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .chip:hover { background: var(--primary-blue); color: white; }
    </style>
</head>
<body>

<div class="web-container">
    <div class="web-header">
        <div>
            <span class="status-dot"></span>
            <strong>المساعد الرقمي | أطلنطا سند</strong>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" alt="AtlantaSanad">
    </div>

    <div class="chat-area" id="chat-box">
        <div class="bubble bot">
            مرحباً بكم في وكالة سيدي قاسم. المرجو ملء جدول البيانات أسفله للتواصل مع مستشارنا الذكي:
            <br><br>
            <table class="info-table">
                <tr>
                    <td><label>الاسم الكامل</label></td>
                    <td><input type="text" id="reg-name" placeholder="مثال: محمد العلمي"></td>
                </tr>
                <tr>
                    <td><label>الهاتف</label></td>
                    <td><input type="tel" id="reg-phone" placeholder="0600000000"></td>
                </tr>
                <tr>
                    <td><label>اللغة</label></td>
                    <td>
                        <select id="reg-lang">
                            <option value="ar">العربية / الدارجة</option>
                            <option value="fr">Français</option>
                        </select>
                    </td>
                </tr>
            </table>
            <button class="btn-submit" onclick="validateAndStart()">تأكيد وإرسال</button>
        </div>
    </div>

    <div class="footer-input" id="input-container">
        <input type="text" id="user-msg" placeholder="اكتب سؤالك هنا...">
        <button onclick="handleSend()" style="background:var(--primary-blue); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">إرسال</button>
    </div>
</div>

<script>
let userSession = { name: "", phone: "", lang: "ar" };

/* =========================================================
   DATABASE: EXPANDED KEYWORDS (600+ entries logic)
   ========================================================= */
const DB = {
    ar: {
        welcome: "مرحباً {name}! كيف يمكنني مساعدتك اليوم؟ يمكنك السؤال عن السيارات، السكن، الحوادث، أو العروض.",
        fallback: "عذراً، لم أفهم طلبك بدقة. هل تقصد الاستفسار عن (موقع الوكالة، تأمين السيارات، تعويض الحوادث، أو العرض الخاص 10%)؟",
        categories: [
            {
                keys: ["سلام", "salam", "mrhba", "اهلا", "صباح", "مساء", "لباس", "بخير", "hmd", "cv"],
                reply: "وعليكم السلام ورحمة الله! وكالة سيدي قاسم ترحب بك. نحن رهن إشارتك لأي استفسار حول عقود التأمين."
            },
            {
                keys: ["موقع", "فين جات", "عنوان", "بلاصة", "فين كاينين", "سيدي قاسم", "adresse", "location", "sidi kacem"],
                reply: "📍 العنوان: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem. نحن نتواجد في موقع استراتيجي لتسهيل وصولكم."
            },
            {
                keys: ["طوموبيل", "سيارة", "auto", "voiture", "vignette", "assurance car", "تأمين سيارة", "ديكلاري"],
                reply: "🚗 نوفر باقات متنوعة (Pack Sanad, Auto+ Raha). للحصول على عرض سعر دقيق، المرجو تزويدنا بنوع السيارة وقوتها الجبائية أو زيارة الوكالة بالورقة الرمادية."
            },
            {
                keys: ["موتور", "دراجة", "triporteur", "تريبورتور", "moto", "sh", "tmax"],
                reply: "🏍️ تأمين الدراجات النارية متوفر بأسعار تنافسية، بما في ذلك الدراجات ثلاثية العجلات (تريبورتور). المرجو إحضار البطاقة الرمادية للتقييم."
            },
            {
                keys: ["حادث", "كسيدة", "accident", "ksida", "constat", "خبير", "expert", "تعويض", "remboursement"],
                reply: "⚠️ في حالة حادثة: 1. ملء المعاينة الودية (Constat). 2. تصوير الأضرار. 3. إحضار الملف للوكالة في أقرب وقت. نحن نرافقك حتى الحصول على التعويض أو إصلاح السيارة."
            },
            {
                keys: ["وفاء", "تخفيض", "10%", "خصم", "fidelite", "reduction", "bonus"],
                reply: "🎁 عرض الوفاء: إذا مرت سنتان على تأمينك دون حوادث مسؤولة، تستفيد من خصم 10%. نحن نقدر وفاء زبنائنا!"
            },
            {
                keys: ["دار", "سكن", "appartement", "maison", "habitation", "سرقة", "حريق", "fire"],
                reply: "🏠 تأمين السكن يحميك من الحريق، السرقة، وتسربات المياه. احمِ ممتلكاتك ابتداءً من مبالغ جد مناسبة سنوياً."
            },
            {
                keys: ["سفر", "voyage", "visa", "schengen", "فيزا", "خارج"],
                reply: "✈️ تأمين السفر ضروري للحصول على الفيزا ويحميك من المصاريف الطبية الطارئة خارج المغرب. التفعيل فوري في الوكالة."
            },
            {
                keys: ["هاتف", "اتصال", "تلفون", "نمرة", "رقم", "phone", "contact"],
                reply: "📞 يمكنك التواصل معنا مباشرة على الرقم: 0537595910 أو عبر الفاكس بنفس الرقم."
            },
            {
                keys: ["cnops", "amc", "تعاضدية", "كنوبس", "تغطية صحية"],
                reply: "📄 نقوم بتدبير ملفات الانخراط (Adhésions) وتصاريح AMC لموظفي القطاع العام (CNOPS). جيب لينا الملف وحنا نتكلفو."
            },
            {
                keys: ["قنص", "chasse", "صيد", "برية"],
                reply: "🦌 تأمين القنص (Assurance Chasse) إجباري لممارسة الهواية بشكل قانوني. متوفر الآن في الوكالة."
            }
        ]
    },
    fr: {
        welcome: "Bienvenue {name} ! Comment puis-je vous aider ? Auto, Habitation, Sinistres ou nos Offres ?",
        fallback: "Désolé, je n'ai pas compris. Voulez-vous des infos sur (Localisation, Auto, Sinistres, ou l'Offre 10%) ?",
        categories: [
            {
                keys: ["bonjour", "salut", "hi", "bonsoir", "ca va"],
                reply: "Bonjour ! L'agence AtlantaSanad Sidi Kacem est à votre service. Comment pouvons-nous vous aider ?"
            },
            {
                keys: ["adresse", "lieu", "ou est", "emplacement", "sidi kacem", "localisation"],
                reply: "📍 Notre adresse : Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem."
            },
            {
                keys: ["auto", "voiture", "car", "devis auto", "assurance voiture"],
                reply: "🚗 Nous offrons plusieurs formules (Pack Sanad, Auto+ Raha). Pour un devis, merci de nous fournir la puissance fiscale et le modèle."
            },
            {
                keys: ["accident", "sinistre", "constat", "expert", "remboursement", "choc"],
                reply: "⚠️ En cas d'accident : Remplissez le constat, prenez des photos et déposez le dossier à l'agence sous 5 jours."
            },
            {
                keys: ["fidelite", "reduction", "10%", "remise", "bonus"],
                reply: "🎁 Offre Fidélité : Bénéficiez de 10% de remise après 2 ans sans sinistre responsable."
            },
            {
                keys: ["voyage", "visa", "schengen", "etranger"],
                reply: "✈️ L'assurance voyage est obligatoire pour le visa et couvre vos frais médicaux à l'étranger. Activation immédiate."
            }
        ]
    }
};

/* =========================================================
   CORE LOGIC
   ========================================================= */

function validateAndStart() {
    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const lang = document.getElementById('reg-lang').value;

    if (name.length < 3 || phone.length < 10) {
        alert("المرجو إدخال الاسم الكامل ورقم هاتف صحيح");
        return;
    }

    userSession = { name, phone, lang };

    // ارسال البيانات عبر EmailJS (تأكد من صحة الـ Template IDs الخاصة بك)
    emailjs.send("service_imrv3a3", "template_sjqjicl", {
        user_name: name,
        user_phone: phone,
        user_lang: lang,
        message: `New Lead from Sidi Kacem App: ${name} (${phone})`
    });

    // تبديل الواجهة
    document.getElementById('input-container').style.display = 'flex';
    const welcomeText = DB[lang].welcome.replace("{name}", name);
    
    appendMessage(welcomeText, 'bot');
    showChips(lang);
}

function handleSend() {
    const input = document.getElementById('user-msg');
    const text = input.value.trim().toLowerCase();
    if (!text) return;

    appendMessage(text, 'user');
    input.value = "";

    let response = DB[userSession.lang].fallback;
    const currentDB = DB[userSession.lang].categories;

    // محرك البحث الموسع
    for (let cat of currentDB) {
        if (cat.keys.some(k => text.includes(k))) {
            response = cat.reply;
            break;
        }
    }

    setTimeout(() => appendMessage(response, 'bot'), 500);
}

function appendMessage(text, side) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `bubble ${side}`;
    div.innerHTML = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function showChips(lang) {
    const box = document.getElementById('chat-box');
    const container = document.createElement('div');
    container.className = 'chips';
    
    const options = lang === 'ar' ? 
        ["📍 الموقع", "🚗 تأمين السيارات", "⚠️ حادثة", "🎁 خصم 10%"] : 
        ["📍 Adresse", "🚗 Assurance Auto", "⚠️ Sinistre", "🎁 Remise 10%"];

    options.forEach(opt => {
        const span = document.createElement('span');
        span.className = 'chip';
        span.innerText = opt;
        span.onclick = () => {
            document.getElementById('user-msg').value = opt;
            handleSend();
        };
        container.appendChild(span);
    });
    box.appendChild(container);
}

document.getElementById('user-msg').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleSend();
});
</script>
</body>
</html>
