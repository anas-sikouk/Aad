<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad Premium - Sidi Kacem</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("vk3TsCj2TbhWy2OOB"); })();</script>

    <style>
        :root {
            --gold: #C5A059;
            --blue: #006EB7;
            --dark-blue: #004a7c;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Poppins', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #004a7c 100%);
            color: var(--white); overflow: hidden;
        }

        /* واجهة الدخول التسويقية */
        #welcome-screen {
            position: fixed; inset: 0; z-index: 999;
            background: radial-gradient(circle at center, #1a2333 0%, #080b12 100%);
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); transition: 0.8s ease-in-out;
        }

        .welcome-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 30px;
            width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease;
        }

        .welcome-card img { width: 150px; margin-bottom: 20px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--gold); }
        
        input, select {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white;
            font-size: 1rem; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--gold); background: rgba(0,0,0,0.5); }

        .btn-start {
            width: 100%; padding: 16px; border-radius: 12px;
            border: none; background: linear-gradient(90deg, var(--gold), #e0bc7a);
            color: #1a2333; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.4); }

        /* واجهة الشات */
        #chat-interface {
            display: none; height: 100vh;
            justify-content: center; align-items: center;
        }

        .chat-window {
            width: 95%; max-width: 550px; height: 90vh;
            background: rgba(13, 17, 23, 0.8);
            border-radius: 30px; border: 1px solid var(--glass);
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .chat-header {
            background: linear-gradient(90deg, var(--blue), var(--dark-blue));
            padding: 20px; display: flex; align-items: center; gap: 15px;
        }

        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; }
        .bot { background: #21262d; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--glass); }
        .user { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-footer { padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" alt="Logo">
        <h2 style="margin-bottom: 30px;">Bienvenue | مرحباً بكم</h2>
        
        <div class="input-group">
            <input type="text" id="reg-name" placeholder="الاسم الكامل / Nom Complet">
        </div>
        
        <div class="input-group">
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف / N° Téléphone">
        </div>

        <div class="input-group">
            <select id="reg-lang">
                <option value="" disabled selected>اختيار اللغة / Choisir la Langue</option>
                <option value="ar">العربية (الدارجة)</option>
                <option value="fr">Français</option>
            </select>
        </div>

        <button class="btn-start" onclick="initChat()">ابدأ المحادثة | Démarrer</button>
    </div>
</div>

<div id="chat-interface">
    <div class="chat-window">
        <div class="chat-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" width="50">
            <div>
                <div style="font-weight: bold;">AtlantaSanad - Sidi Kacem</div>
                <div style="font-size: 0.7rem; color: #00ff88;">Assistant Intelligent Online</div>
            </div>
        </div>
        <div class="chat-body" id="chat-box"></div>
        <div class="chat-footer">
            <input type="text" id="user-input" placeholder="Tapez votre message..." style="margin:0;">
            <button onclick="sendMessage()" style="width: 80px; margin:0; padding:10px; font-size:0.9rem;">OK</button>
        </div>
    </div>
</div>

<script>
let userData = { name: "", phone: "", lang: "ar" };

const DB = {
    ar: {
        welcome: "مرحباً {name}! كيف نقدر نعاونك اليوم بخصوص خدمات التأمين في سيدي قاسم؟",
        address: "📍 العنوان ديالنا: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem.",
        discount: "🎁 كزبون وفي لمدة سنتين، كتربح تخفيض 10%. (كيتلغى يلا كنتي مسؤول على حادثة).",
        accident: "⚠️ في حالة حادثة: جيب لينا الكونسطا وتصاور الأضرار و Devis. غنصيفطوك للخبير ونتكلفو بالباقي.",
        fallback: "ما فهمتش سؤالك مزيان، تقدر تسول على (الموقع، الكسيدة، أثمنة السيارات، أو الخصم).",
        keys: [
            { k: ["سلام", "salam", "mrhba"], r: "وعليكم السلام! كيف نقدر نعاونك؟" },
            { k: ["موقع", "عنوان", "adresse", "فين جات"], r: "📍 العنوان: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem." },
            { k: ["سيارة", "طوموبيل", "auto"], r: "🚗 عندنا أفضل عروض تأمين السيارات والموتورات في سيدي قاسم." }
        ]
    },
    fr: {
        welcome: "Bonjour {name}! Comment puis-je vous aider avec nos services d'assurance à Sidi Kacem ?",
        address: "📍 Notre adresse: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem.",
        discount: "🎁 10% de réduction après 2 ans de fidélité (Annulée en cas de responsabilité).",
        accident: "⚠️ En cas d'accident: Apportez le constat + photos + devis. Nous gérons l'expert et le remboursement.",
        fallback: "Je n'ai نه pas compris. Essayez de demander (Adresse, Accident, Auto, ou Réduction).",
        keys: [
            { k: ["bonjour", "salut", "hi"], r: "Bonjour! En quoi puis-je vous être utile ?" },
            { k: ["adresse", "lieu", "ou est"], r: "📍 Adresse: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem." },
            { k: ["auto", "voiture", "assurance"], r: "🚗 Nous offrons les meilleures couvertures auto et moto." }
        ]
    }
};

function initChat() {
    const name = document.getElementById('reg-name').value;
    const phone = document.getElementById('reg-phone').value;
    const lang = document.getElementById('reg-lang').value;

    if (!name || !phone || !lang) {
        alert("المرجو ملء جميع الخانات | Veuillez remplir tous les champs");
        return;
    }

    userData = { name, phone, lang };

    // ارسال البيانات
    emailjs.send("service_imrv3a3", "template_sjqjicl", {
        message: `Client: ${name}, Phone: ${phone}, Lang: ${lang}`,
        user_name: name
    });

    document.getElementById('welcome-screen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-interface').style.display = 'flex';
        const msg = DB[lang].welcome.replace("{name}", name);
        appendMsg(msg, 'bot');
    }, 800);
}

function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim().toLowerCase();
    if (!text) return;

    appendMsg(text, 'user');
    input.value = '';

    let response = DB[userData.lang].fallback;
    
    // محرك البحث في القاعدة المختارة
    const currentDB = DB[userData.lang];

    if (text.includes("موقع") || text.includes("adresse")) response = currentDB.address;
    else if (text.includes("حادث") || text.includes("accident") || text.includes("كسيدة")) response = currentDB.accident;
    else if (text.includes("خصم") || text.includes("تخفيض") || text.includes("reduction") || text.includes("10%")) response = currentDB.discount;
    else {
        for(let entry of currentDB.keys) {
            if(entry.k.some(key => text.includes(key))) {
                response = entry.r;
                break;
            }
        }
    }

    setTimeout(() => appendMsg(response, 'bot'), 600);
}

function appendMsg(text, type) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
