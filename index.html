<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad Premium - Sidi Kacem</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("vk3TsCj2TbhWy2OOB"); })();</script>

    <style>
        :root {
            --gold: #D4AF37;
            --blue: #005696;
            --dark-bg: #0a0e14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2a3a 0%, #0a0e14 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        /* حاوية الشات الرئيسية */
        .chat-container {
            width: 95%; max-width: 500px; height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        /* الهيدر */
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px 30px 0 0;
        }
        .header img { width: 55px; filter: drop-shadow(0 0 5px var(--gold)); }

        .chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* فقاعة إدخال البيانات */
        .onboarding-card {
            background: rgba(255, 255, 255, 0.07);
            padding: 25px; border-radius: 20px;
            border-left: 4px solid var(--gold);
            animation: slideIn 0.5s ease;
        }
        .onboarding-card h3 { margin-top: 0; color: var(--gold); font-size: 1.1rem; }

        input, select {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 10px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.4); color: white; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #f3d060);
            color: #000; border: none; padding: 12px; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        /* الرسائل */
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; animation: pop 0.3s ease; }
        .bot { background: #1e2733; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .user { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* منطقة الكتابة (مخفية في البداية) */
        .input-area {
            padding: 20px; display: none; gap: 10px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" alt="Logo">
        <div>
            <div style="font-weight: bold; font-size: 1.1rem;">أطلنطا سند - سيدي قاسم</div>
            <div style="font-size: 0.75rem; color: #aaa;">الوكالة الرقمية المعتمدة</div>
        </div>
    </div>

    <div class="chat-content" id="chat-box">
        <div class="onboarding-card" id="form-container">
            <h3>مرحباً بك | Bienvenue</h3>
            <p style="font-size: 0.85rem; margin-bottom: 15px;">المرجو ملء البيانات لبدء المحادثة :</p>
            <input type="text" id="reg-name" placeholder="الاسم الكامل / Nom Complet">
            <input type="tel" id="reg-phone" placeholder="الهاتف / Téléphone">
            <select id="reg-lang">
                <option value="ar">العربية / الدارجة</option>
                <option value="fr">Français</option>
            </select>
            <button class="btn-gold" onclick="submitData()">تأكيد البيانات | Valider</button>
        </div>
    </div>

    <div class="input-area" id="input-zone">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." style="margin:0;">
        <button onclick="handleMsg()" style="width: 80px; margin:0; padding:10px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">OK</button>
    </div>
</div>

<script>
let userData = { name: "", phone: "", lang: "ar" };

/* ================= KEYWORDS DATABASE ================= */
const keywordsDB = {
    ar: {
        welcome: "مرحباً {name}! كيف نقدر نعاونك بخصوص تأمين السيارات، الحوادث، أو العروض المتوفرة؟",
        keys: [
            { words: ["سلام", "salam", "mrhba", "اهلا"], reply: "وعليكم السلام! وكالة سيدي قاسم ترحب بك. كيف نقدر نعاونك؟" },
            { words: ["موقع", "فين جات", "عنوان", "بلاصة"], reply: "📍 وكالتنا كاينة في: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem." },
            { words: ["سيارة", "طوموبيل", "auto", "voiture"], reply: "🚗 كنعطيوك أحسن ثمن لتأمين سيارتك. جيب لينا Carte Grise للوكالة ونعطيوك Devis فالحين." },
            { words: ["حادث", "كسيدة", "accident", "constat"], reply: "⚠️ الله يحفظ! الإجراءات: جيب الكونسطا وتصاور الأضرار. حنا كنتكلفو بالخبير والتعويض." },
            { words: ["خصم", "تخفيض", "وفاء", "10%"], reply: "🎁 كزبون وفي (سنتين بدون حوادث مسؤولة)، عندك خصم 10% على تأمينك." },
            { words: ["هاتف", "نمرة", "تلفون", "اتصال"], reply: "📞 تقدر تتصل بنا مباشرة على: 0537595910" }
        ],
        fallback: "ما فهمتش السؤال مزيان. تقدر تسول على (الموقع، السيارات، الحوادث، أو الخصم)."
    },
    fr: {
        welcome: "Bienvenue {name} ! Comment puis-je vous aider (Assurance Auto, Sinistres, Réductions) ?",
        keys: [
            { words: ["bonjour", "salut", "hi", "bonsoir"], reply: "Bonjour ! Bienvenue à l'agence de Sidi Kacem. En quoi puis-je vous aider ?" },
            { words: ["adresse", "lieu", "ou est", "emplacement"], reply: "📍 Notre agence est située à : Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem." },
            { words: ["auto", "voiture", "assurance"], reply: "🚗 Nous proposons les meilleures offres auto. Présentez votre Carte Grise à l'agence pour un devis." },
            { words: ["accident", "sinistre", "constat"], reply: "⚠️ En cas d'accident : Apportez le constat et les photos. Nous gérons l'expertise et le remboursement." },
            { words: ["reduction", "remise", "10%", "fidelite"], reply: "🎁 Bénéficiez de 10% de réduction après 2 ans de fidélité sans sinistre responsable." },
            { words: ["contact", "telephone", "appel"], reply: "📞 Vous pouvez nous joindre au : 0537595910" }
        ],
        fallback: "Je n'ai pas bien compris. Demandez (Adresse, Auto, Accident ou Réduction)."
    }
};

/* ================= LOGIC ================= */
function submitData() {
    const name = document.getElementById('reg-name').value;
    const phone = document.getElementById('reg-phone').value;
    const lang = document.getElementById('reg-lang').value;

    if (!name || !phone) return alert("المرجو إدخال جميع البيانات!");

    userData = { name, phone, lang };

    // إرسال عبر EmailJS
    emailjs.send("service_imrv3a3", "template_sjqjicl", {
        message: `Client: ${name}, Phone: ${phone}, Lang: ${lang}`,
        user_name: name
    });

    // إخفاء الفورم وإظهار منطقة الكتابة
    document.getElementById('form-container').style.display = 'none';
    document.getElementById('input-zone').style.display = 'flex';

    const welcomeMsg = keywordsDB[lang].welcome.replace("{name}", name);
    appendMsg(welcomeMsg, 'bot');
}

function handleMsg() {
    const input = document.getElementById('user-input');
    const text = input.value.trim().toLowerCase();
    if (!text) return;

    appendMsg(text, 'user');
    input.value = '';

    const currentDB = keywordsDB[userData.lang];
    let reply = currentDB.fallback;

    for (let entry of currentDB.keys) {
        if (entry.words.some(w => text.includes(w))) {
            reply = entry.reply;
            break;
        }
    }

    setTimeout(() => appendMsg(reply, 'bot'), 500);
}

function appendMsg(text, type) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') handleMsg(); });
</script>

</body>
</html>
