<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad 3D Assistant - Sidi Kacem</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("vk3TsCj2TbhWy2OOB"); })();</script>

    <style>
        :root {
            --primary: #006EB7;
            --secondary: #00b4ff;
            --bg: #0b0f19;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system;
            color: white; overflow: hidden;
            background: radial-gradient(circle at center, #1a2333 0%, #0b0f19 100%);
        }

        /* خلفية متحركة */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.5;
            background: linear-gradient(45deg, transparent 48%, var(--primary) 50%, transparent 52%);
            background-size: 10px 10px;
        }

        /* واجهة التسجيل (Login) */
        #auth-screen {
            position: fixed; inset: 0; display: flex;
            justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(15px);
        }

        .auth-card {
            background: var(--glass);
            padding: 40px; border-radius: 30px;
            border: 1px solid var(--border);
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease;
        }

        /* واجهة الشات (Chat) */
        #chat-screen {
            display: none; height: 100vh;
            justify-content: center; align-items: center;
        }

        .chat-container {
            width: 95%; max-width: 500px; height: 85vh;
            background: var(--glass);
            border-radius: 25px; border: 1px solid var(--border);
            display: flex; flex-direction: column;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        /* مكونات التصميم */
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .header img { width: 60px; filter: drop-shadow(0 0 10px var(--primary)); }
        
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; position: relative; animation: pop 0.3s ease; }
        .bot-msg { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: linear-gradient(135deg, var(--primary), var(--secondary)); align-self: flex-end; border-bottom-right-radius: 4px; }

        input, button {
            padding: 15px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; width: 100%; box-sizing: border-box;
        }

        button {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .opt-btn { width: auto; font-size: 0.8rem; padding: 8px 15px; background: rgba(255,255,255,0.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div id="auth-screen">
    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" width="120" style="margin-bottom: 20px;">
        <h2>مرحباً بك في وكالة سيدي قاسم</h2>
        <p style="color: #ccc; font-size: 0.9rem; margin-bottom: 25px;">المرجو إدخال معلوماتك للتواصل مع المساعد الذكي</p>
        <input type="text" id="user-name" placeholder="الاسم الكامل">
        <input type="tel" id="user-phone" placeholder="رقم الهاتف">
        <button onclick="startApp()">دخول المحادثة</button>
    </div>
</div>

<div id="chat-screen">
    <div class="chat-container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png">
            <div>
                <div style="font-weight: bold;">AtlantaSanad AI</div>
                <div style="font-size: 0.7rem; color: #00ff88;">● متصل الآن | سيدي قاسم</div>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="msg bot-msg">
                مرحباً! أنا المساعد الرقمي للوكالة. كيف يمكنني مساعدتك اليوم؟
                <div class="options">
                    <button class="opt-btn" onclick="quickAsk('📍 الموقع')">📍 الموقع</button>
                    <button class="opt-btn" onclick="quickAsk('🚗 السيارات')">🚗 السيارات</button>
                    <button class="opt-btn" onclick="quickAsk('🎁 الوفاء')">🎁 الوفاء</button>
                    <button class="opt-btn" onclick="quickAsk('📄 CNOPS')">📄 CNOPS</button>
                </div>
            </div>
        </div>

        <div style="padding: 15px; display: flex; gap: 10px;">
            <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." style="margin:0;">
            <button onclick="handleInput()" style="width: 80px; margin:0;">إرسال</button>
        </div>
    </div>
</div>

<script>
let clientData = { name: "", phone: "" };

/* ================= نظام الردود الذكي (NLP) ================= */
const responses = [
    { keys: ["سلام", "salam", "bonjour", "hi", "mrhba", "مرحبا"], reply: "وعليكم السلام! مرحبا بك في وكالة سيدي قاسم. باش نقدر نعاونك؟" },
    { keys: ["bikhir", "labas", "بخير", "hmd", "cv"], reply: "اللهم لك الحمد! حنا هنا باش نسهلو عليك أمور التأمين." },
    { keys: ["موقع", "عنوان", "adresse", "فين جات"], reply: "📍 وكالتنا كاينة في: Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem." },
    { keys: ["طوموبيل", "سيارة", "auto", "voiture"], reply: "🚗 عندنا عروض ممتازة لتأمين السيارات والدراجات والتريبورتور. جيب لينا غير الكارت غريز ونعطيوك الثمن." },
    { keys: ["وفاء", "تخفيض", "10%", "خصم"], reply: "🎁 يلا كنتي زبون وفي لمدة سنتين، كتحصل على خصم 10%. ربالك! الخصم كيتحيد يلا كنتي مسؤول على حادثة." },
    { keys: ["حادث", "كسيدة", "ksida", "constat"], reply: "⚠️ نتمناو تكونو بخير. جيب لينا الكونسطا وتصاور الأضرار و Devis الإصلاح. غنصيفطوك للخبير ونتكلفو بكلشي." },
    { keys: ["cnops", "amc", "تعاضدية"], reply: "📄 حنا كنتكلفو بـ Gestion des adhésions و Déclaration des amc (CNOPS) للمنخرطين." },
    { keys: ["شكرا", "merci", "shokran"], reply: "مرحبا بك دائماً في وكالة أطلنطا سند سيدي قاسم!" }
];

/* ================= المحرك ================= */
function startApp() {
    const name = document.getElementById('user-name').value;
    const phone = document.getElementById('user-phone').value;

    if (!name || !phone) return alert("المرجو ملء البيانات!");

    clientData = { name, phone };

    // إرسال البيانات إلى EmailJS
    emailjs.send("service_imrv3a3", "template_sjqjicl", {
        message: `زبون جديد: ${name} | الهاتف: ${phone}`,
        user_name: name
    }).then(() => console.log("Data Sent!"), (err) => console.log("EmailJS Error", err));

    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
}

function handleInput() {
    const input = document.getElementById('user-input');
    const text = input.value.trim().toLowerCase();
    if (!text) return;

    appendMsg(text, 'user-msg');
    input.value = '';

    let foundReply = "ما فهمتش قصدك مزيان. تقدر تسولني على الموقع، تأمين السيارات، أو إجراءات الكسيدة.";
    
    for (let item of responses) {
        if (item.keys.some(key => text.includes(key))) {
            foundReply = item.reply;
            break;
        }
    }

    setTimeout(() => appendMsg(foundReply, 'bot-msg'), 500);
}

function quickAsk(text) {
    document.getElementById('user-input').value = text;
    handleInput();
}

function appendMsg(text, type) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') handleInput(); });
</script>

</body>
</html>
