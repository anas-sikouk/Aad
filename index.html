<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad 3D AI - Sidi Kacem</title>
    
    <style>
        :root { 
            --blue: #006EB7; 
            --blue-light: #008be6;
            --accent: #3fb950; 
            --glass-bg: rgba(22, 27, 34, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #0d1117 0%, #1a2333 50%, #0d1117 100%);
            color: white; 
            overflow: hidden;
        }

        #chat-screen { 
            width: 95%; max-width: 550px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; 
            padding: 20px; 
            height: 90vh; 
            display: flex; flex-direction: column; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header { 
            display: flex; align-items: center; gap: 15px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid var(--glass-border); 
        }
        
        .header img {
            width: 75px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .chat-box { 
            flex: 1; overflow-y: auto; padding: 15px 5px; 
            display: flex; flex-direction: column; gap: 15px; 
            scrollbar-width: thin;
        }

        .message { 
            padding: 14px 18px; border-radius: 20px; 
            max-width: 85%; line-height: 1.6; font-size: 0.95rem; word-wrap: break-word; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .bot-msg { 
            background: linear-gradient(145deg, #21262d, #161b22); 
            align-self: flex-start; border-bottom-right-radius: 20px; border-bottom-left-radius: 4px; 
            border: 1px solid #30363d; 
        }

        .user-msg { 
            background: linear-gradient(145deg, var(--blue), var(--blue-light)); 
            align-self: flex-end; border-bottom-left-radius: 20px; border-bottom-right-radius: 4px; 
        }

        .options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .opt-btn { 
            background: rgba(0, 110, 183, 0.1); border: 1px solid var(--blue); color: #66b3ff; 
            padding: 8px 14px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s ease;
        }
        .opt-btn:hover { background: var(--blue); color: white; transform: translateY(-2px); }

        .input-area { display: flex; gap: 10px; padding-top: 15px; }
        input { 
            flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.4); color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--blue); }
        
        .send-btn { 
            background: linear-gradient(145deg, var(--blue), var(--blue-light)); border: none; padding: 0 24px; 
            border-radius: 14px; color: white; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .send-btn:hover { transform: translateY(-2px); }

        .loading { font-size: 0.85rem; color: #8b949e; display: none; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

<div id="chat-screen">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" alt="Logo">
        <div>
            <div style="font-weight: 800; font-size: 1.1rem;">AtlantaSanad - سيدي قاسم</div>
            <div style="font-size: 0.75rem; color: var(--accent); font-weight: 600;">النظام الذكي الهجين (متصل) ●</div>
        </div>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">
            مرحباً بك في وكالة سيدي قاسم. أنا مساعدك الذكي المعتمد على قاعدة بياناتنا. كيف أساعدك؟
            <div class="options">
                <button class="opt-btn" onclick="quickAsk('📍 فين جات الوكالة؟')">الموقع</button>
                <button class="opt-btn" onclick="quickAsk('🚗 تأمين السيارات')">تأمين السيارات</button>
                <button class="opt-btn" onclick="quickAsk('⚠️ إجراءات الحوادث')">إجراءات الحوادث</button>
                <button class="opt-btn" onclick="quickAsk('🎁 خصم 10%')">عرض الوفاء</button>
            </div>
        </div>
    </div>

    <div id="loading" class="loading">جاري معالجة طلبك...</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
        <button class="send-btn" onclick="handleInput()">إرسال</button>
    </div>
</div>

<script>
/* ================= DATABASE ================= */
const DB = {
    company: { address: "Nouveau Quartier, rue 5 imm. 80 n°3 rdc Sidi Kacem", phone: "0537595910" },
    services: { ar: ["تأمين السيارات", "الدراجات", "الدراجات ثلاثية العجلات", "المنازل", "السفر", "البناء"] },
    rules: {
        discount: { darija: "كتربح 10% من بعد جوج سنين ديال الوفاء (كتحيد يلا درتي كسيدة وكنتي نتا لي غالط)" },
        claim: { darija: "كتجيب constat + تصاور + devis، كتمشي عند الخبير، كتصلح، وكتجيب الفاتورة باش تعوض" }
    },
    faq: [
        { keywords:["سيارة","car","auto"], darija:"🚗 تأمين الطوموبيل فيه عروض زوينة بحال Pack SANAD" },
        { keywords:["حادث","accident","ksida","كسيدة"], darija:"📄 أول حاجة السلامة، وجيب لينا الكونسطا والتصاور في 5 أيام" },
        { keywords:["تريبورتور","triporteur","دراجة"], darija:"🏍️ كاين تأمين الموتورات والتريبورتورات بأثمنة مناسبة" }
    ]
};

const OPENROUTER_KEY = "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"; 
const LLM_MODEL = "arcee-ai/trinity-large-preview:free";

/* ================= ENGINE ================= */
function engine(msg) {
    msg = msg.toLowerCase().trim();
    for (const item of DB.faq) {
        for (const key of item.keywords) { if (msg.includes(key)) return item.darija; }
    }
    const rulesMap = [
        { check: ["خصم", "discount", "وفاء", "10%"], data: DB.rules.discount.darija },
        { check: ["حادث", "تعويض", "كسيدة"], data: DB.rules.claim.darija },
        { check: ["خدمة", "services"], data: DB.services.ar.join(" | ") }
    ];
    for (const rule of rulesMap) {
        for (const k of rule.check) { if (msg.includes(k)) return rule.data; }
    }
    if (msg.includes("موقع") || msg.includes("عنوان")) return "📍 " + DB.company.address;
    if (msg.includes("هاتف") || msg.includes("اتصال")) return "📞 " + DB.company.phone;
    return null; 
}

/* ================= UI HANDLERS ================= */
function quickAsk(text) {
    document.getElementById('user-input').value = text;
    handleInput();
}

async function handleInput() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    appendMessage(text, 'user-msg');
    input.value = '';
    const loading = document.getElementById('loading');
    loading.style.display = 'block';

    const engineResult = engine(text);

    if (engineResult) {
        setTimeout(() => {
            loading.style.display = 'none';
            appendMessage(engineResult, 'bot-msg');
        }, 500);
    } else {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${OPENROUTER_KEY}`, 
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href, // ضروري لـ OpenRouter
                    "X-Title": "AtlantaSanad Sidi Kacem" // ضروري لـ OpenRouter
                },
                body: JSON.stringify({
                    model: LLM_MODEL,
                    messages: [
                        { role: "system", content: `أجب باختصار بالدارجة المغربية كخبير وكالة أطلنطا سند بسيدي قاسم. العنوان: ${DB.company.address}` },
                        { role: "user", content: text }
                    ]
                })
            });
            
            if(!response.ok) {
                const errDetail = await response.json();
                console.error("OpenRouter Error:", errDetail);
                throw new Error("API Error");
            }
            
            const data = await response.json();
            loading.style.display = 'none';
            
            if(data.choices && data.choices.length > 0) {
                appendMessage(data.choices[0].message.content, 'bot-msg');
            } else {
                appendMessage("عذراً، لم أتلقَ رداً واضحاً.", 'bot-msg');
            }
            
        } catch (e) {
            console.error("Fetch Exception:", e);
            loading.style.display = 'none';
            appendMessage("عذراً، الموديل المجاني عليه ضغط حالياً أو هناك مشكل في الاتصال. تواصل معنا عبر: " + DB.company.phone, 'bot-msg');
        }
    }
}

function appendMessage(text, className) {
    const chatBox = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `message ${className}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

document.getElementById('user-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') handleInput();
});
</script>
</body>
</html>
